name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build
        continue-on-error: true

      - name: Security audit
        id: audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Security audit (JSON)
        id: audit-json
        if: always()
        run: npm audit --json > audit-results.json || true

      - name: Generate summary
        if: always()
        run: |
          echo "## Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.install.outcome }}" == "success" ]; then
            echo "| Install Dependencies | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Install Dependencies | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.lint.outcome }}" == "success" ]; then
            echo "| Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Lint | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.audit.outcome }}" == "success" ]; then
            echo "| Security Audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security Audit | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "audit-results.json" ]; then
            echo "### npm Audit Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            CRITICAL=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-results.json)
            HIGH=$(jq -r '.metadata.vulnerabilities.high // 0' audit-results.json)
            MEDIUM=$(jq -r '.metadata.vulnerabilities.moderate // 0' audit-results.json)
            LOW=$(jq -r '.metadata.vulnerabilities.low // 0' audit-results.json)
            TOTAL=$(jq -r '.metadata.vulnerabilities.total // 0' audit-results.json)

            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$CRITICAL" -gt 0 ] 2>/dev/null; then
              echo "> ⚠️ **Warning:** $CRITICAL critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$HIGH" -gt 0 ] 2>/dev/null; then
              echo "> ⚠️ **Warning:** $HIGH high vulnerabilities found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$MEDIUM" -gt 0 ] 2>/dev/null; then
              echo "> ℹ️ $MEDIUM medium vulnerabilities found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$LOW" -gt 0 ] 2>/dev/null; then
              echo "> ℹ️ $LOW low vulnerabilities found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            echo "### Remediation" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "cd frontend" >> $GITHUB_STEP_SUMMARY
            echo "npm audit fix              # auto-fix compatible updates" >> $GITHUB_STEP_SUMMARY
            echo "npm audit fix --force      # force major version bumps (review changes)" >> $GITHUB_STEP_SUMMARY
            echo "npm update <package>       # update a specific package" >> $GITHUB_STEP_SUMMARY
            echo "npm audit                  # re-check after fixing" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Error details
        if: always() && (steps.lint.outcome == 'failure' || steps.build.outcome == 'failure' || steps.audit.outcome == 'failure')
        run: |
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Error Details</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.lint.outcome }}" == "failure" ]; then
            echo "**Lint Errors:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            npm run lint 2>&1 | tail -50 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "**Build Errors:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            npm run build 2>&1 | tail -50 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.audit.outcome }}" == "failure" ]; then
            echo "**Audit Errors:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            npm audit 2>&1 | tail -50 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Check results
        if: always()
        run: |
          FAILED=0
          if [ "${{ steps.lint.outcome }}" == "failure" ] || \
             [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "One or more steps failed"
            FAILED=1
          fi
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        id: install
        run: pip install -r requirements.txt

      - name: Install security tools
        id: install-tools
        run: pip install "safety<3" bandit

      - name: Safety check
        id: safety
        run: safety check --file requirements.txt
        continue-on-error: true

      - name: Safety check (JSON)
        id: safety-json
        if: always()
        run: safety check --file requirements.txt --json > safety-results.json || true

      - name: Bandit scan
        id: bandit
        run: bandit -r app/ -ll
        continue-on-error: true

      - name: Bandit scan (JSON)
        id: bandit-json
        if: always()
        run: bandit -r app/ -ll -f json -o bandit-results.json || true

      - name: Generate summary
        if: always()
        run: |
          echo "## Backend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.install.outcome }}" == "success" ]; then
            echo "| Install Dependencies | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Install Dependencies | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.safety.outcome }}" == "success" ]; then
            echo "| Safety Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Safety Check | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.bandit.outcome }}" == "success" ]; then
            echo "| Bandit Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Bandit Scan | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Safety results
          if [ -f "safety-results.json" ]; then
            echo "### Safety Check Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            VULN_COUNT=$(jq -r 'if type == "array" then length else 0 end' safety-results.json)
            echo "**Vulnerabilities Found:** $VULN_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$VULN_COUNT" -gt 0 ] 2>/dev/null; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>View vulnerability descriptions</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Package | Advisory |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
              jq -r '
                if type == "array" then
                  .[]
                  | [
                      (.package_name // "unknown"),
                      ((.advisory // "No advisory")
                        | gsub("CVE-[0-9]{4}-[0-9]+"; "")
                        | gsub("\\|"; "/")
                        | gsub("[\\r\\n]+"; " ")
                        | gsub("[[:space:]]+"; " ")
                        | gsub("^[[:space:]]+|[[:space:]]+$"; "")
                        | .[0:220])
                    ]
                  | @tsv
                else empty end
              ' safety-results.json | head -20 | while IFS=$'\t' read -r package advisory; do
                echo "| $package | $advisory |" >> $GITHUB_STEP_SUMMARY
              done
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_Showing first 20 findings._" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Bandit results
          if [ -f "bandit-results.json" ]; then
            echo "### Bandit Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            HIGH=$(jq -r '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-results.json)
            MEDIUM=$(jq -r '[.results[] | select(.issue_severity == "MEDIUM")] | length' bandit-results.json)
            LOW=$(jq -r '[.results[] | select(.issue_severity == "LOW")] | length' bandit-results.json)
            TOTAL=$(jq -r '.results | length' bandit-results.json)

            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$TOTAL" -gt 0 ] 2>/dev/null; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>View issue descriptions</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Severity | Description | File |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------------|----------|" >> $GITHUB_STEP_SUMMARY
              jq -r '
                .results[]?
                | [
                    (.issue_severity // "UNKNOWN"),
                    ((.issue_text // "No description")
                      | gsub("\\|"; "/")
                      | gsub("[\\r\\n]+"; " ")
                      | .[0:180]),
                    ((.filename // "n/a") + ":" + ((.line_number // 0) | tostring))
                  ]
                | @tsv
              ' bandit-results.json | head -20 | while IFS=$'\t' read -r severity text file; do
                echo "| $severity | $text | $file |" >> $GITHUB_STEP_SUMMARY
              done
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_Showing first 20 findings._" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Apply per-severity thresholds
          # Safety findings are counted as HIGH (no severity breakdown in safety<3 JSON)
          # Bandit reports CRITICAL / HIGH / MEDIUM / LOW
          SAFETY_COUNT=0
          BANDIT_HIGH=0
          BANDIT_MEDIUM=0
          BANDIT_LOW=0
          if [ -f "safety-results.json" ]; then
            SAFETY_COUNT=$(jq -r 'if type == "array" then length else 0 end' safety-results.json)
          fi
          if [ -f "bandit-results.json" ]; then
            BANDIT_HIGH=$(jq -r '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-results.json)
            BANDIT_MEDIUM=$(jq -r '[.results[] | select(.issue_severity == "MEDIUM")] | length' bandit-results.json)
            BANDIT_LOW=$(jq -r '[.results[] | select(.issue_severity == "LOW")] | length' bandit-results.json)
          fi

          TOTAL_HIGH=$((SAFETY_COUNT + BANDIT_HIGH))
          TOTAL_MEDIUM=$BANDIT_MEDIUM
          TOTAL_LOW=$BANDIT_LOW

          if [ "$TOTAL_HIGH" -gt 0 ] 2>/dev/null; then
            echo "> ⚠️ **Warning:** $TOTAL_HIGH high-severity findings (safety: $SAFETY_COUNT, bandit: $BANDIT_HIGH)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$TOTAL_MEDIUM" -gt 0 ] 2>/dev/null; then
            echo "> ℹ️ $TOTAL_MEDIUM medium-severity findings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$TOTAL_LOW" -gt 0 ] 2>/dev/null; then
            echo "> ℹ️ $TOTAL_LOW low-severity findings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Remediation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd backend" >> $GITHUB_STEP_SUMMARY
          echo "pip install --upgrade <package>       # upgrade a vulnerable package" >> $GITHUB_STEP_SUMMARY
          echo "pip install --upgrade -r requirements.txt  # upgrade all packages" >> $GITHUB_STEP_SUMMARY
          echo "safety check --file requirements.txt  # re-check after fixing" >> $GITHUB_STEP_SUMMARY
          echo "bandit -r app/                        # re-run static analysis" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi

