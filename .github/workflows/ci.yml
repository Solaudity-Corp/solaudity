  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Semgrep
        id: semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: >-
            p/default
            p/javascript
            p/typescript
            p/python
            p/security-audit
            p/owasp-top-ten
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          echo "## Semgrep SAST Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.semgrep.outcome }}" == "success" ]; then
            echo "| Semgrep Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Semgrep Scan | ❌ Findings detected |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.semgrep.outcome }}" == "failure" ]; then
            echo "Semgrep found security issues"
            exit 1
          fi

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi

