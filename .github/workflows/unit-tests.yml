name: Unit Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      is_workflow_call:
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  backend:
    name: Backend Tests
    if: github.actor != 'dependabot[bot]' || inputs.is_workflow_call == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build backend test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./backend
          file: ./docker/backend.test.Dockerfile
          load: true
          tags: solaudity-backend-tests:local
          cache-from: type=gha,scope=backend-tests
          cache-to: type=gha,mode=max,scope=backend-tests

      - name: Run backend unit tests
        id: tests
        run: |
          set -o pipefail
          docker run --rm solaudity-backend-tests:local \
            python -m pytest tests \
              -vv -rA --color=yes --override-ini=console_output_style=classic --disable-warnings \
            2>&1 | tee backend-test-output.txt
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          echo "## Backend Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "| Pytest Suite | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Pytest Suite | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "backend-test-output.txt" ]; then
            PASSED=$(grep -oP '(\d+)\s+passed' backend-test-output.txt | grep -oP '\d+' | tail -1)
            FAILED=$(grep -oP '(\d+)\s+failed' backend-test-output.txt | grep -oP '\d+' | tail -1)
            ERRORS=$(grep -oP '(\d+)\s+error' backend-test-output.txt | grep -oP '\d+' | tail -1)
            PASSED="${PASSED:-0}"
            FAILED="${FAILED:-0}"
            ERRORS="${ERRORS:-0}"

            if [ "$PASSED" -gt 0 ] 2>/dev/null || [ "$FAILED" -gt 0 ] 2>/dev/null || [ "$ERRORS" -gt 0 ] 2>/dev/null; then
              echo "### Test Results" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
              echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
              echo "| 💥 Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Error Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            sed 's/\x1b\[[0-9;]*m//g' backend-test-output.txt | tail -80 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Remediation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Run tests locally (Docker)" >> $GITHUB_STEP_SUMMARY
          echo "bash test.sh unit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run tests locally (native)" >> $GITHUB_STEP_SUMMARY
          echo "cd backend" >> $GITHUB_STEP_SUMMARY
          echo "pip install -r requirements.txt -r requirements-dev.txt" >> $GITHUB_STEP_SUMMARY
          echo "DB_PATH=/tmp/test.db pytest tests -vv    # run all tests" >> $GITHUB_STEP_SUMMARY
          echo "DB_PATH=/tmp/test.db pytest tests -x     # stop on first failure" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "Backend unit tests failed"
            exit 1
          fi

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi

  appsec:
    name: API Security Tests
    if: github.actor != 'dependabot[bot]' || inputs.is_workflow_call == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build backend test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./backend
          file: ./docker/backend.test.Dockerfile
          load: true
          tags: solaudity-backend-tests:local
          cache-from: type=gha,scope=backend-tests
          cache-to: type=gha,mode=max,scope=backend-tests

      - name: Run API security tests
        id: tests
        run: |
          set -o pipefail
          docker run --rm solaudity-backend-tests:local \
            python -m pytest \
              tests/test_auth_api.py \
              tests/test_audits_api.py \
              tests/test_scope_api.py \
              tests/test_heimdall_api.py \
              tests/test_surya_api.py \
              -vv -rA --color=yes --override-ini=console_output_style=classic --disable-warnings \
            2>&1 | tee appsec-test-output.txt
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          echo "## API Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "| Pytest API Suite | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Pytest API Suite | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "appsec-test-output.txt" ]; then
            PASSED=$(grep -oP '(\d+)\s+passed' appsec-test-output.txt | grep -oP '\d+' | tail -1)
            FAILED=$(grep -oP '(\d+)\s+failed' appsec-test-output.txt | grep -oP '\d+' | tail -1)
            ERRORS=$(grep -oP '(\d+)\s+error' appsec-test-output.txt | grep -oP '\d+' | tail -1)
            PASSED="${PASSED:-0}"
            FAILED="${FAILED:-0}"
            ERRORS="${ERRORS:-0}"

            if [ "$PASSED" -gt 0 ] 2>/dev/null || [ "$FAILED" -gt 0 ] 2>/dev/null || [ "$ERRORS" -gt 0 ] 2>/dev/null; then
              echo "### Test Results" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
              echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
              echo "| 💥 Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Error Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            sed 's/\x1b\[[0-9;]*m//g' appsec-test-output.txt | tail -80 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Remediation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "bash test.sh appsec" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "API security tests failed"
            exit 1
          fi

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi

  frontend:
    name: Frontend Tests
    if: github.actor != 'dependabot[bot]' || inputs.is_workflow_call == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build frontend test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./frontend
          file: ./docker/frontend.test.Dockerfile
          load: true
          tags: solaudity-frontend-tests:local
          cache-from: type=gha,scope=frontend-tests
          cache-to: type=gha,mode=max,scope=frontend-tests

      - name: Run frontend unit tests
        id: tests
        run: |
          set -o pipefail
          docker run --rm solaudity-frontend-tests:local 2>&1 | tee frontend-test-output.txt
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          echo "## Frontend Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "| Docker Build (test image) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            echo "| Vitest Suite | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            if grep -q "test image build failed" frontend-test-output.txt 2>/dev/null; then
              echo "| Docker Build (test image) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
              echo "| Vitest Suite | ⚠️ Skipped |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Docker Build (test image) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
              echo "| Vitest Suite | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "frontend-test-output.txt" ]; then
            PASSED=$(grep -oP 'Tests\s+.*?(\d+)\s+passed' frontend-test-output.txt | grep -oP '\d+(?=\s+passed)' | tail -1)
            FAILED=$(grep -oP '(\d+)\s+failed' frontend-test-output.txt | grep -oP '\d+(?=\s+failed)' | tail -1)
            PASSED="${PASSED:-0}"
            FAILED="${FAILED:-0}"

            if [ "$PASSED" -gt 0 ] 2>/dev/null || [ "$FAILED" -gt 0 ] 2>/dev/null; then
              echo "### Test Results" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
              echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Error Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            sed 's/\x1b\[[0-9;]*m//g' frontend-test-output.txt | tail -80 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Remediation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Run tests locally (Docker)" >> $GITHUB_STEP_SUMMARY
          echo "bash test.sh unit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run tests locally (native)" >> $GITHUB_STEP_SUMMARY
          echo "cd frontend" >> $GITHUB_STEP_SUMMARY
          echo "npm ci" >> $GITHUB_STEP_SUMMARY
          echo "npm run test:run               # single run (CI mode)" >> $GITHUB_STEP_SUMMARY
          echo "npm run test                   # watch mode (dev)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "Frontend unit tests failed"
            exit 1
          fi

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi
