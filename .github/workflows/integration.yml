name: Integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pull-requests: write
  packages: write

jobs:
  integration:
    name: Docker Build & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build backend image
        id: build-backend
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          load: true
          tags: docker-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache:backend
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache:backend,mode=max
        continue-on-error: true

      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          load: true
          tags: docker-frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache:frontend
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache:frontend,mode=max
        continue-on-error: true

      - name: Start services
        id: start-services
        if: steps.build-backend.outcome == 'success' && steps.build-frontend.outcome == 'success'
        run: docker compose -f docker/docker-compose.yml --profile prod up -d --no-build
        continue-on-error: true

      - name: Health check backend
        id: health-backend
        if: steps.start-services.outcome == 'success'
        run: curl --retry 15 --retry-delay 3 --retry-all-errors -sf http://localhost:8001/health
        continue-on-error: true

      - name: Health check frontend
        id: health-frontend
        if: steps.start-services.outcome == 'success'
        run: curl --retry 15 --retry-delay 3 --retry-all-errors -sf http://localhost:5173/
        continue-on-error: true

      - name: Trivy scan frontend image
        id: trivy-frontend
        if: steps.build-frontend.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: docker-frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Trivy scan frontend (JSON)
        id: trivy-frontend-json
        if: steps.build-frontend.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: docker-frontend:latest
          format: json
          output: trivy-frontend.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Trivy scan backend image
        id: trivy-backend
        if: steps.build-backend.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: docker-backend:latest
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Trivy scan backend (JSON)
        id: trivy-backend-json
        if: steps.build-backend.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: docker-backend:latest
          format: json
          output: trivy-backend.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Docker build status
          echo "### Docker Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.build-backend.outcome }}" == "success" ]; then
            echo "| Backend | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.build-frontend.outcome }}" == "success" ]; then
            echo "| Frontend | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Health check status
          echo "### Health Check Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.health-backend.outcome }}" == "success" ]; then
            echo "| Backend (\`/health\`) | ✅ Healthy |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.health-backend.outcome }}" == "failure" ]; then
            echo "| Backend (\`/health\`) | ❌ Unhealthy |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend (\`/health\`) | ⚠️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.health-frontend.outcome }}" == "success" ]; then
            echo "| Frontend (\`/\`) | ✅ Healthy |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.health-frontend.outcome }}" == "failure" ]; then
            echo "| Frontend (\`/\`) | ❌ Unhealthy |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend (\`/\`) | ⚠️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Trivy scan results
          echo "### Trivy Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Frontend Trivy
          if [ -f "trivy-frontend.json" ]; then
            FRONTEND_CRITICAL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-frontend.json)
            FRONTEND_HIGH=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-frontend.json)
            FRONTEND_TOTAL=$(jq -r '[.Results[]?.Vulnerabilities[]?] | length' trivy-frontend.json)

            echo "#### Frontend Image" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Critical | $FRONTEND_CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| High | $FRONTEND_HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$FRONTEND_TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$FRONTEND_TOTAL" -gt 0 ] 2>/dev/null; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Top vulnerability descriptions</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Severity | Description | Package |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
              jq -r '
                [.Results[]?.Vulnerabilities[]?]
                | .[:20]
                | .[]
                | [
                    (.Severity // "UNKNOWN"),
                    ((.Title // "No description")
                      | gsub("CVE-[0-9]{4}-[0-9]+"; "")
                      | gsub("\\|"; "/")
                      | gsub("[\\r\\n]+"; " ")
                      | gsub("[[:space:]]+"; " ")
                      | gsub("^[[:space:]]+|[[:space:]]+$"; "")
                      | .[0:180]),
                    (.PkgName // "n/a")
                  ]
                | @tsv
              ' trivy-frontend.json | while IFS=$'\t' read -r severity description package; do
                echo "| $severity | $description | $package |" >> $GITHUB_STEP_SUMMARY
              done
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_Showing first 20 findings._" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi


          else
            echo "#### Frontend Image" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Scan skipped or failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Backend Trivy
          if [ -f "trivy-backend.json" ]; then
            BACKEND_CRITICAL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-backend.json)
            BACKEND_HIGH=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-backend.json)
            BACKEND_TOTAL=$(jq -r '[.Results[]?.Vulnerabilities[]?] | length' trivy-backend.json)

            echo "#### Backend Image" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Critical | $BACKEND_CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| High | $BACKEND_HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$BACKEND_TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$BACKEND_TOTAL" -gt 0 ] 2>/dev/null; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Top vulnerability descriptions</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Severity | Description | Package |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
              jq -r '
                [.Results[]?.Vulnerabilities[]?]
                | .[:20]
                | .[]
                | [
                    (.Severity // "UNKNOWN"),
                    ((.Title // "No description")
                      | gsub("CVE-[0-9]{4}-[0-9]+"; "")
                      | gsub("\\|"; "/")
                      | gsub("[\\r\\n]+"; " ")
                      | gsub("[[:space:]]+"; " ")
                      | gsub("^[[:space:]]+|[[:space:]]+$"; "")
                      | .[0:180]),
                    (.PkgName // "n/a")
                  ]
                | @tsv
              ' trivy-backend.json | while IFS=$'\t' read -r severity description package; do
                echo "| $severity | $description | $package |" >> $GITHUB_STEP_SUMMARY
              done
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "_Showing first 20 findings._" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi


          else
            echo "#### Backend Image" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Scan skipped or failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Count CRITICAL and HIGH separately across both images
          TRIVY_CRITICAL=0
          TRIVY_HIGH=0
          if [ -f "trivy-frontend.json" ]; then
            FE_CRITICAL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-frontend.json)
            FE_HIGH=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-frontend.json)
            TRIVY_CRITICAL=$((TRIVY_CRITICAL + FE_CRITICAL))
            TRIVY_HIGH=$((TRIVY_HIGH + FE_HIGH))
          fi
          if [ -f "trivy-backend.json" ]; then
            BE_CRITICAL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-backend.json)
            BE_HIGH=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-backend.json)
            TRIVY_CRITICAL=$((TRIVY_CRITICAL + BE_CRITICAL))
            TRIVY_HIGH=$((TRIVY_HIGH + BE_HIGH))
          fi

          if [ "$TRIVY_CRITICAL" -gt 0 ] 2>/dev/null; then
            echo "> **PR blocked:** $TRIVY_CRITICAL fixable critical image vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "TRIVY_VULN_BLOCKED=true" >> "$GITHUB_ENV"
          fi
          if [ "$TRIVY_HIGH" -gt 5 ] 2>/dev/null; then
            echo "> **PR blocked:** $TRIVY_HIGH fixable high image vulnerabilities found (threshold: 5)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "TRIVY_VULN_BLOCKED=true" >> "$GITHUB_ENV"
          fi

          echo "### 🛠️ Remediation Guide" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**1. How to check vulnerabilities locally:**" >> $GITHUB_STEP_SUMMARY
          echo "First, rebuild your images locally and run Trivy to inspect the exact vulnerabilities:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker/docker-compose.yml build" >> $GITHUB_STEP_SUMMARY
          echo "trivy image docker-frontend:latest" >> $GITHUB_STEP_SUMMARY
          echo "trivy image docker-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**2. How to fix vulnerabilities:**" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Image:** If the vulnerability is in the base OS, update the \`FROM\` tag in your Dockerfile to a newer version or run \`docker pull\` to get the latest patches." >> $GITHUB_STEP_SUMMARY
          echo "- **OS Packages:** Add package upgrades in your Dockerfile:" >> $GITHUB_STEP_SUMMARY
          echo "  - Alpine: \`RUN apk upgrade --no-cache\`" >> $GITHUB_STEP_SUMMARY
          echo "  - Debian/Ubuntu: \`RUN apt-get update && apt-get upgrade -y\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependencies:** If the vulnerability is in Python/Node packages, update your \`requirements.txt\` or \`package.json\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**3. Verify the fix:**" >> $GITHUB_STEP_SUMMARY
          echo "After modifying your Dockerfiles or dependencies, rebuild and scan again locally before pushing." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      # SARIF upload requires GitHub Advanced Security (paid, not available on free plan)
      # - name: Upload frontend Trivy results
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always() && steps.trivy-frontend.outcome == 'success'
      #   with:
      #     sarif_file: trivy-frontend.sarif
      #     category: trivy-frontend
      #
      # - name: Upload backend Trivy results
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always() && steps.trivy-backend.outcome == 'success'
      #   with:
      #     sarif_file: trivy-backend.sarif
      #     category: trivy-backend

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml --profile prod down -v --rmi local

      - name: Check results
        if: always()
        run: |
          FAILED=0

          if [ "${{ steps.build-backend.outcome }}" == "failure" ]; then
            echo "Backend build failed"
            FAILED=1
          fi

          if [ "${{ steps.build-frontend.outcome }}" == "failure" ]; then
            echo "Frontend build failed"
            FAILED=1
          fi

          if [ "${{ steps.health-backend.outcome }}" == "failure" ]; then
            echo "Backend health check failed"
            FAILED=1
          fi

          if [ "${{ steps.health-frontend.outcome }}" == "failure" ]; then
            echo "Frontend health check failed"
            FAILED=1
          fi

          if [ "$TRIVY_VULN_BLOCKED" == "true" ]; then
            echo "Fixable image vulnerabilities exceed threshold (critical >0 / high >5)"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Comment PR with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY" --edit-last || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::PR comment skipped — summary file is empty"
          fi
