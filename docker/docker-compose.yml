services:
  backend:
    build: ../backend
    ports:
      - "8001:8001"
    volumes:
      - ../data:/data

  frontend:
    build: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    profiles:
      - prod

  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh /app/dev-entrypoint.sh
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  frontend_node_modules:
