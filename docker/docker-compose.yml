name: solaudity
services:
  solaudity-backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    # Explicit image name so `docker compose up --no-build` (used by CI after a
    # buildx --load) can find the pre-built image instead of the compose
    # auto-generated `solaudity-solaudity-backend` name.
    image: docker-backend:latest
    ports:
      - "8001:8001"
    volumes:
      - ../data:/data
    environment:
      - DB_PATH=/data/solaudity.db

  solaudity-frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    image: docker-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - solaudity-backend
    profiles:
      - prod

  solaudity-frontend-dev:
    image: node:24-alpine
    working_dir: /app
    command: sh /app/dev-entrypoint.sh
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - solaudity-backend
    profiles:
      - dev

volumes:
  frontend_node_modules:
