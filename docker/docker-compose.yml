name: solaudity
services:
  solaudity-backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    user: "${HOST_UID}:${HOST_GID}"
    ports:
      - "8001:8001"
    volumes:
      - ../data:/data
    environment:
      - DB_PATH=/data/solaudity.db
    profiles:
      - prod

  solaudity-backend-dev:
    image: python:3.13-slim
    working_dir: /app
    command: sh /app/dev-entrypoint.sh
    environment:
      - DB_PATH=/data/solaudity.db
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ../backend:/app
      - ../data:/data
      - backend_pip_cache:/root/.cache/pip
    ports:
      - "8001:8001"
    profiles:
      - dev

  solaudity-frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - solaudity-backend
    profiles:
      - prod

  solaudity-frontend-dev:
    image: node:24-alpine
    working_dir: /app
    command: sh /app/dev-entrypoint.sh
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - solaudity-backend-dev
    profiles:
      - dev

volumes:
  frontend_node_modules:
  backend_pip_cache:
